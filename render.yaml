services:
  # Frontend estático (editor)
  - type: web
    name: cctvplan
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # Backend de IA (auto-diseño con Claude)
  - type: web
    name: cctvplan-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: node src/server.js
    healthCheckPath: /api/health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-opus-4-8
      - key: FRONTEND_URL
        value: https://cctvplan.onrender.com,https://cctvplan.axionet.io
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_MAPS_KEY
        sync: false
